<svg xmlns="http://www.w3.org/2000/svg" viewBox="120 145 275 235" role="img" aria-label="Victor Garcia Blog logo mark on dark background">
  <title>Victor Garcia Blog logo mark on dark background</title>
  <defs>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fe8ff"/>
      <stop offset="100%" stop-color="#4fd2e6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="none"/>
  <g filter="url(#shadow)" transform="translate(256 268)">
    <text
      x="0"
      y="0"
      text-anchor="middle"
      font-family="Arial Black, Arial, sans-serif"
      font-size="206"
      font-weight="900"
      letter-spacing="-20"
      fill="#f8fbfc"
      stroke="url(#stroke)"
      stroke-width="9"
      paint-order="stroke fill"
    >VG</text>
  </g>
</svg>
